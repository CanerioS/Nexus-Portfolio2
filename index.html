<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_OS_v9.5_BETA_FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        :root { --neon: #00f3ff; --dark: #010101; --up: #00ff88; --down: #ff003c; }
        body { background-color: var(--dark); color: var(--neon); font-family: 'Share Tech Mono', monospace; overflow-x: hidden; margin: 0; transition: color 0.4s ease; }
        
        /* Scanline Effects */
        body::before {
            content: " "; display: block; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999; background-size: 100% 3px, 2px 100%; pointer-events: none;
        }

        /* SONSUZ DÖNGÜ BORSA BANDI */
        .ticker-container { width: 100%; overflow: hidden; background: rgba(0, 243, 255, 0.05); border-bottom: 1px solid rgba(0, 243, 255, 0.2); position: relative; z-index: 100; display: flex; }
        .ticker-wrap { display: flex; white-space: nowrap; padding: 8px 0; animation: infiniteScroll 60s linear infinite; }
        @keyframes infiniteScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .ticker-item { display: inline-flex; align-items: center; margin-right: 60px; font-size: 10px; font-weight: bold; }

        /* RADAR SYSTEM (Sol Alt) - Mobilde küçültüldü */
        #radar-sys { position: fixed; bottom: 20px; left: 20px; width: 80px; height: 80px; border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 50%; z-index: 500; display: none; }
        @media (min-width: 768px) { #radar-sys { width: 120px; height: 120px; } }
        #radar-sys::after { content: ""; position: absolute; inset: 0; border-radius: 50%; background: conic-gradient(from 0deg, rgba(0, 243, 255, 0.1), transparent); animation: sweep 4s linear infinite; }
        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Auth & Particles */
        #auth-canvas { position: absolute; inset: 0; z-index: 1; }
        .auth-container { position: relative; width: 280px; height: 280px; z-index: 10; }
        @media (min-width: 768px) { .auth-container { width: 320px; height: 320px; } }
        .auth-scanner { position: absolute; inset: 0; border: 1px solid rgba(0, 243, 255, 0.15); background: radial-gradient(circle, rgba(0, 243, 255, 0.08) 0%, transparent 80%); clip-path: polygon(10% 0, 90% 0, 100% 10%, 100% 90%, 90% 100%, 10% 100%, 0 90%, 0 10%); }
        .scan-bar { position: absolute; width: 100%; height: 3px; background: var(--neon); box-shadow: 0 0 25px var(--neon); top: 0; animation: moveScan 2.8s ease-in-out infinite; display: none; }
        @keyframes moveScan { 0%, 100% { top: 0; opacity: 0; } 50% { top: 100%; opacity: 1; } }

        /* Terminal & Professional Side Guide - MOBİL UYUM EKLENDİ */
        #terminal-container { position: fixed; bottom: -100%; left: 0; width: 100%; height: 80vh; background: rgba(1,1,1,0.98); border-top: 2px solid var(--neon); transition: bottom 0.5s cubic-bezier(0.19, 1, 0.22, 1); z-index: 8000; display: flex; flex-direction: column; }
        @media (min-width: 768px) { #terminal-container { height: 320px; flex-direction: row; } }
        #terminal-container.active { bottom: 0; }
        
        #guide-panel { width: 100%; border-top: 1px solid rgba(0, 243, 255, 0.2); background: rgba(0, 30, 40, 0.3); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; height: 200px; }
        @media (min-width: 768px) { #guide-panel { width: 380px; border-top: none; border-left: 1px solid rgba(0, 243, 255, 0.2); height: auto; } }
        
        .cmd-btn { padding: 4px 8px; margin-bottom: 4px; border: 1px solid rgba(0, 243, 255, 0.1); cursor: pointer; font-size: 10px; text-align: left; transition: 0.2s; }
        .cmd-btn:hover { background: var(--neon); color: black; box-shadow: 0 0 10px var(--neon); }

        /* General UI */
        .cyber-panel { border: 1px solid var(--neon); background: rgba(0, 243, 255, 0.03); clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%); transition: all 0.3s; }
        .chart-bar { height: 6px; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
        #extraction-loader { display: none; position: fixed; inset: 0; z-index: 9500; background: rgba(1,1,1,0.98); flex-direction: column; align-items: center; justify-content: center; }
        .hologram-cube { width: 40px; height: 40px; transform-style: preserve-3d; animation: rotate 20s linear infinite; }
        .face { position: absolute; width: 40px; height: 40px; border: 1px solid var(--neon); background: rgba(0, 243, 255, 0.05); }
        @keyframes rotate { from { transform: rotateX(0) rotateY(0); } to { transform: rotateX(360deg) rotateY(360deg); } }
    </style>
</head>
<body onclick="initAudio()">

    <!-- 1. GÜVENLİK GİRİŞİ -->
    <div id="auth-screen" class="fixed inset-0 z-[10000] flex flex-col items-center justify-center bg-black overflow-hidden">
        <canvas id="auth-canvas"></canvas>
        <div class="auth-container">
            <div class="auth-scanner"><div id="scan-bar" class="scan-bar"></div></div>
            <div class="absolute -left-10 md:-left-20 top-1/2 -translate-y-1/2 text-[7px] md:text-[9px] opacity-40 uppercase tracking-widest" style="writing-mode: vertical-rl;">Central_Core_Wait</div>
            <div class="absolute -right-10 md:-right-20 top-1/2 -translate-y-1/2 text-[7px] md:text-[9px] opacity-40 uppercase tracking-widest" style="writing-mode: vertical-rl;">Bio_Metric_Lock</div>
        </div>
        <div id="auth-status" class="mt-12 text-sm font-bold tracking-[0.3em] md:tracking-[0.5em] text-cyan-600 relative z-20">SYSTEM_STANDBY</div>
        <button id="auth-btn" onclick="startAuth()" class="mt-8 px-10 md:px-14 py-4 border border-cyan-500 hover:bg-cyan-500 hover:text-black transition-all font-bold tracking-[0.3em] text-xs uppercase bg-cyan-900/10 relative z-20">INITIALIZE</button>
    </div>

    <div id="radar-sys">
        <div id="radar-coords" class="absolute -bottom-6 left-0 w-full text-center text-[7px] opacity-40">X:000 Y:000</div>
    </div>
    <div id="side-log"></div>

    <div id="extraction-loader">
        <div class="text-[10px] tracking-[1em] mb-4 animate-pulse uppercase opacity-70 text-center">Extracting_Data_Nodes...</div>
        <div class="loading-frame" style="width:80%; max-width:350px; height:4px; border:1px solid var(--neon); padding:1px;"><div id="loading-fill" style="height:100%; background:var(--neon); width:0%; box-shadow:0 0 15px var(--neon);"></div></div>
        <div id="load-percent" class="mt-2 text-[10px] opacity-50">0%</div>
    </div>

    <!-- 2. ANA SİSTEM -->
    <div id="main-system" class="hidden h-screen w-full relative">
        <div class="ticker-container"><div class="ticker-wrap" id="ticker-content-loop"></div></div>
        <canvas id="bg-canvas" class="fixed inset-0"></canvas>
        
        <header class="relative z-50 flex justify-between p-4 text-[8px] md:text-[10px] opacity-60 bg-black/50 font-bold uppercase tracking-widest">
            <div id="sys-time">00:00:00</div>
            <div id="sys-mem" class="hidden sm:block">MEM: 12.4GB</div>
            <div class="text-green-500">PRIME_CONNECTED</div>
        </header>

        <main class="relative z-10 flex flex-col items-center justify-center min-h-full pb-20 px-6 text-center">
            <div class="hologram-cube mb-8 mt-12">
                <div class="face" style="transform: translateZ(20px)"></div><div class="face" style="transform: rotateY(180deg) translateZ(20px)"></div>
                <div class="face" style="transform: rotateY(90deg) translateZ(20px)"></div><div class="face" style="transform: rotateY(-90deg) translateZ(20px)"></div>
            </div>
            <h1 class="text-3xl md:text-6xl font-black mb-8 tracking-tighter uppercase italic">Nexus_Core_v9.5</h1>
            <!-- GRID SİSTEMİ MOBİL UYUMLU YAPILDI -->
            <div id="project-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 w-full max-w-6xl overflow-y-auto"></div>
            <p class="mt-8 text-[9px] opacity-30 tracking-[0.4em] animate-pulse uppercase">Ctrl + K : Command Interface</p>
        </main>

        <!-- TERMINAL & SIDE GUIDE PANEL -->
        <div id="terminal-container">
            <div class="flex-grow p-6 flex flex-col min-h-[250px]">
                <div class="flex justify-between mb-2 border-b border-cyan-900 pb-2 text-[10px]">
                    <span>SYS_CONSOLE_ROOT_v9.5</span>
                    <button onclick="toggleTerminal()" class="text-red-500 hover:text-white">[ EXIT ]</button>
                </div>
                <div id="terminal-output" class="flex-grow overflow-y-auto text-[11px] space-y-1 mb-4 opacity-70 font-mono"></div>
                <div class="flex items-center gap-2 font-mono"><span class="text-cyan-500">></span><input type="text" id="terminal-input" class="bg-transparent border-none outline-none w-full text-cyan-300 uppercase" autofocus autocomplete="off"></div>
            </div>
            
            <div id="guide-panel">
                <h4 class="text-xs font-bold text-white tracking-widest border-b border-cyan-900 pb-2 mb-4 uppercase">Command_Library</h4>
                <div class="space-y-4">
                    <div>
                        <p class="text-[9px] opacity-40 mb-2 uppercase italic">// System_Control</p>
                        <button class="cmd-btn w-full" onclick="executeQuick('status')">status <span class="opacity-30 float-right">Durum</span></button>
                        <button class="cmd-btn w-full" onclick="executeQuick('clear')">clear <span class="opacity-30 float-right">Temizle</span></button>
                    </div>
                    <div class="pb-4">
                        <p class="text-[9px] opacity-40 mb-2 uppercase italic">// Data_Streams</p>
                        <button class="cmd-btn w-full" onclick="executeQuick('market')">market <span class="opacity-30 float-right">Borsa</span></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ANALİZ OVERLAY - MOBİLDE KAYDIRMA EKLENDİ -->
        <div id="overlay" class="fixed inset-0 z-[9000] hidden flex flex-col md:flex-row">
            <div id="lp" class="w-full md:w-1/4 h-32 md:h-full bg-black border-r border-cyan-900 -translate-x-full md:-translate-x-full transition-transform duration-500 p-4 md:p-8 overflow-hidden font-mono text-[8px] opacity-30"><div id="log-flow"></div></div>
            <div id="rp" class="w-full md:w-3/4 h-full bg-[#010101] translate-y-full md:translate-y-0 md:translate-x-full transition-transform duration-500 p-6 md:p-12 flex flex-col overflow-y-auto">
                <div class="flex justify-between items-center mb-8 border-b border-cyan-900/30 pb-4">
                    <h2 id="ot" class="text-xl md:text-4xl font-bold tracking-tighter uppercase italic"></h2>
                    <button onclick="closeProject()" class="text-[8px] md:text-[10px] border border-red-500 px-4 md:px-6 py-2 hover:bg-red-500 hover:text-white transition-all uppercase">Disconnect</button>
                </div>
                <div class="flex-grow grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="col-span-1 border border-cyan-900/50 p-6 bg-cyan-950/5 cyber-panel"><div id="metrics-content" class="space-y-6"></div></div>
                    <div class="lg:col-span-2 border border-cyan-900/50 p-6 flex flex-col">
                        <p id="proj-long-desc" class="text-xs md:text-sm opacity-60 mb-6 leading-relaxed"></p>
                        <div class="overflow-x-auto">
                            <table class="w-full text-[10px] text-left opacity-50 border-t border-cyan-900/30 mt-auto font-mono">
                                <thead><tr><th class="py-2">MODULE</th><th>STATUS</th><th>LOAD</th></tr></thead>
                                <tbody id="table-content"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PROJECTS = [
            { id: 'FIN', title: 'QUANTUM_FINANCE', tech: 'WAPR/VaR', desc: 'Gerçek zamanlı portföy analiz çekirdeği.', metrics: [{l:'Risk',v:'85%'},{l:'Yield',v:'92%'}], table:[{m:'Core',s:'ACTIVE',l:'12%'},{m:'Feed',s:'STABLE',l:'44%'}] },
            { id: 'HR', title: 'NEXUS_HR', tech: 'SQL Logic', desc: 'İK hiyerarşi veritabanı.', metrics: [{l:'Sync',v:'100%'},{l:'Eff',v:'88%'}], table:[{m:'DB',s:'ACTIVE',l:'08%'},{m:'Auth',s:'SECURE',l:'15%'}] },
            { id: 'UX', title: 'CYBER_UX', tech: 'React/Framer', desc: 'Tasarım sistemi manifestosu.', metrics: [{l:'Visual',v:'98%'},{l:'Speed',v:'99%'}], table:[{m:'Render',s:'ACTIVE',l:'65%'},{m:'Grid',s:'STABLE',l:'04%'}] },
            { id: 'VEL', title: 'VELOCITY_ENG', tech: 'Telemetry', desc: '250SR teknik takip dashboardu.', metrics: [{l:'Batt',v:'75%'},{l:'Eng',v:'82%'}], table:[{m:'Sensor',s:'ACTIVE',l:'31%'},{m:'Diag',s:'STABLE',l:'02%'}] }
        ];

        const MARKET_DATA = [{s:'BTC/USD',p:'64.230',c:'+1.2%',st:'BULLISH'},{s:'ETH/USD',p:'3.120',c:'-0.5%',st:'NEUTRAL'},{s:'GOLD',p:'2.315',c:'+0.2%',st:'STABLE'},{s:'BIST100',p:'10.240',c:'+2.1%',st:'STRONG'}];

        let audioCtx;
        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function softBeep(freq, duration, volume = 0.02) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
        function softSweep(startFreq, endFreq, duration) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(startFreq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.05);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        const authCanvas = document.getElementById('auth-canvas');
        const authCtx = authCanvas.getContext('2d');
        let particles = [], mouse = { x: null, y: null, radius: 150 };
        window.addEventListener('mousemove', (e) => { 
            mouse.x = e.clientX; mouse.y = e.clientY; 
            if(document.getElementById('radar-coords')) {
                document.getElementById('radar-coords').innerText = `X:${Math.floor(mouse.x)} Y:${Math.floor(mouse.y)}`;
            }
        });

        class Particle {
            constructor() { this.x = Math.random()*authCanvas.width; this.y = Math.random()*authCanvas.height; this.size = Math.random()*1.2+0.5; this.baseX = this.x; this.baseY = this.y; this.density = Math.random()*20+1; }
            draw() { authCtx.fillStyle = 'rgba(0, 243, 255, 0.3)'; authCtx.beginPath(); authCtx.arc(this.x, this.y, this.size, 0, Math.PI*2); authCtx.fill(); }
            update() {
                let dx = mouse.x - this.x, dy = mouse.y - this.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < mouse.radius) { let force = (mouse.radius - dist)/mouse.radius; this.x -= (dx/dist)*force*this.density; this.y -= (dy/dist)*force*this.density; }
                else { if (this.x !== this.baseX) this.x -= (this.x-this.baseX)/15; if (this.y !== this.baseY) this.y -= (this.y-this.baseY)/15; }
            }
        }
        function initParticles() { authCanvas.width = window.innerWidth; authCanvas.height = window.innerHeight; particles = []; for (let i = 0; i < 120; i++) particles.push(new Particle()); }
        function animateParticles() { authCtx.clearRect(0, 0, authCanvas.width, authCanvas.height); particles.forEach(p => { p.draw(); p.update(); }); connectParticles(); requestAnimationFrame(animateParticles); }
        function connectParticles() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x, dy = particles[a].y - particles[b].y, dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 100) { authCtx.strokeStyle = `rgba(0, 243, 255, ${(1 - dist/100)*0.1})`; authCtx.lineWidth = 0.5; authCtx.beginPath(); authCtx.moveTo(particles[a].x, particles[a].y); authCtx.lineTo(particles[b].x, particles[b].y); authCtx.stroke(); }
                }
            }
        }
        initParticles(); animateParticles();

        function startAuth() {
            initAudio(); document.getElementById('auth-btn').style.display='none'; document.getElementById('scan-bar').style.display='block'; 
            softBeep(300, 0.4, 0.03); 
            setTimeout(() => {
                document.getElementById('auth-status').innerText = 'AUTHORIZED'; document.getElementById('auth-status').style.color = '#00ff88'; 
                softBeep(600, 0.6, 0.04);
                setTimeout(() => { 
                    document.getElementById('auth-screen').style.display = 'none'; 
                    document.getElementById('main-system').classList.remove('hidden'); 
                    document.getElementById('radar-sys').style.display = 'block';
                    renderProjects(); renderInfiniteTicker(); 
                    setInterval(() => { document.getElementById('sys-time').innerText = new Date().toLocaleTimeString(); }, 1000); 
                    initMainBackground(); 
                }, 1000);
            }, 3000);
        }

        function renderInfiniteTicker() {
            const wrap = document.getElementById('ticker-content-loop');
            const html = MARKET_DATA.map(m => `<div class="ticker-item"><span style="color:${m.c.startsWith('+')?'var(--up)':'var(--down)'};margin-right:8px;">[${m.s}]</span><span style="color:#fff;margin-right:12px;">${m.p}</span><span style="color:${m.c.startsWith('+')?'var(--up)':'var(--down)'};margin-right:12px;">${m.c}</span><span style="opacity:0.3;font-size:8px;border:1px solid;padding:1px 4px;">${m.st}</span></div>`).join('');
            wrap.innerHTML = html + html;
        }

        function renderProjects() { document.getElementById('project-grid').innerHTML = PROJECTS.map(p => `<div class="cyber-panel p-6 cursor-pointer hover:bg-cyan-500/10 group" onclick="startExtraction('${p.id}')"><div class="text-[8px] opacity-30 mb-2 group-hover:text-cyan-400">>> NODE_${p.id}</div><h3 class="text-lg font-bold tracking-widest text-white uppercase">${p.title}</h3></div>`).join(''); }
        
        function startExtraction(id) {
            const loader = document.getElementById('extraction-loader'), fill = document.getElementById('loading-fill'), pct = document.getElementById('load-percent');
            let progress = 0; loader.style.display = 'flex'; 
            softSweep(400, 900, 1.5);
            const interval = setInterval(() => { progress += Math.floor(Math.random()*15)+5; if(progress>100) progress=100; fill.style.width=progress+'%'; pct.innerText=progress+'%'; if(progress>=100) { clearInterval(interval); setTimeout(() => { loader.style.display='none'; openProject(id); }, 400); } }, 150);
        }

        function openProject(id) {
            const p = PROJECTS.find(x => x.id === id); softBeep(440, 0.2);
            document.getElementById('ot').innerText = p.title; document.getElementById('proj-long-desc').innerText = p.desc;
            document.getElementById('metrics-content').innerHTML = p.metrics.map(m => `<div><div class="flex justify-between text-[9px] mb-2 uppercase opacity-60"><span>${m.l}</span><span>${m.v}</span></div><div class="w-full bg-cyan-950 h-1.5"><div class="chart-bar" style="width: 0%" data-val="${m.v}"></div></div></div>`).join('');
            document.getElementById('table-content').innerHTML = p.table.map(t => `<tr class="border-b border-cyan-900/20"><td class="py-2 text-xs">${t.m}</td><td class="text-cyan-500 font-bold text-xs">${t.s}</td><td class="text-xs">${t.l}</td></tr>`).join('');
            document.getElementById('overlay').classList.remove('hidden');
            setTimeout(() => { document.getElementById('lp').style.transform='translateX(0)'; document.getElementById('rp').style.transform='translateY(0) translateX(0)'; document.querySelectorAll('.chart-bar').forEach(b => b.style.width = b.getAttribute('data-val')); }, 50);
        }

        function closeProject() { softBeep(200, 0.3); document.getElementById('lp').style.transform='translateX(-100%)'; if(window.innerWidth < 768) document.getElementById('rp').style.transform='translateY(100%)'; else document.getElementById('rp').style.transform='translateX(100%)'; setTimeout(() => document.getElementById('overlay').classList.add('hidden'), 500); }
        
        function toggleTerminal() { 
            const container = document.getElementById('terminal-container');
            container.classList.toggle('active'); 
            if(container.classList.contains('active')) document.getElementById('terminal-input').focus();
            softBeep(500, 0.1); 
        }

        window.addEventListener('keydown', (e) => { if(e.ctrlKey && e.key === 'k') { e.preventDefault(); toggleTerminal(); } });
        function executeQuick(cmd) { document.getElementById('terminal-input').value = cmd; processCommand(cmd); }

        function processCommand(cmd) {
            const out = document.createElement('div'); out.innerText = `> ${cmd}`; document.getElementById('terminal-output').appendChild(out);
            let resp = ""; const args = cmd.toLowerCase().split(' ');
            if(args[0] === 'status') resp = "All systems nominal.";
            else if(args[0] === 'clear') { document.getElementById('terminal-output').innerHTML = ''; resp = "Purged."; }
            else if(args[0] === 'exit') { toggleTerminal(); resp = "Closing..."; }
            else resp = "Unknown command.";

            const rOut = document.createElement('div'); 
            rOut.innerText = `>> Neural_AI: ${resp}`; rOut.style.color = "var(--neon)";
            document.getElementById('terminal-output').appendChild(rOut); 
            document.getElementById('terminal-input').value = ''; 
            document.getElementById('terminal-output').scrollTop = document.getElementById('terminal-output').scrollHeight; 
            softBeep(700, 0.05);
        }

        document.getElementById('terminal-input').addEventListener('keydown', (e) => { if(e.key === 'Enter') processCommand(e.target.value.toLowerCase().trim()); });
        function initMainBackground() { const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d'); canvas.width = window.innerWidth; canvas.height = window.innerHeight; function draw() { ctx.fillStyle = 'rgba(1, 1, 1, 0.15)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = 'rgba(0, 243, 255, 0.01)'; for(let i=0; i<canvas.width; i+=60) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); } requestAnimationFrame(draw); } draw(); }
    </script>
</body>
</html>
